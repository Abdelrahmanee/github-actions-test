name: pull_request_to_main
on:
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - "src/**"
  pull_request:
    branches:
      - main
      - 'release/**'
    paths:
      - "src/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: checkout code
        uses: actions/checkout@v2
      - name: run tests
        run: npm  test
